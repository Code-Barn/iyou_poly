<!-- polly/templates/partials/navbar.html -->
<nav class="bg-white shadow-sm dark:bg-gray-800">
    <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between">
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">
                <a href="{% url 'poll_list' %}">Polly</a>
            </h1>
            <div class="flex items-center space-x-4">
                <button
                    id="theme-toggle"
                    type="button"
                    class="p-2 rounded-md text-gray-500 hover:text-gray-700 dark:hover:text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[color:var(--primary-color)]"
                    aria-label="Toggle dark mode"
                >
                    <svg id="theme-toggle-dark-icon" class="h-6 w-6 hidden" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                    </svg>
                    <svg id="theme-toggle-light-icon" class="h-6 w-6 hidden" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path>
                    </svg>
                </button>
                <div class="flex items-center space-x-4">
                    {% if user.is_authenticated %}
                        <span class="text-sm text-gray-600 dark:text-gray-300">Logged in as {{ user.username }}</span>
                        <a href="{% url 'vc_management' %}" class="text-sm text-[color:var(--primary-color)] hover:underline leading-none">Credentials</a>
                        <a href="{% url 'logout' %}" class="text-sm text-[color:var(--primary-color)] hover:underline leading-none" onclick="event.preventDefault(); document.getElementById('logout-form').submit();">Logout</a>
                        <form id="logout-form" method="post" action="{% url 'logout' %}" class="hidden">
                            {% csrf_token %}
                        </form>
                {% else %}
                    <a href="{% url 'login' %}" class="text-sm text-[color:var(--primary-color)] hover:underline">Login</a>
                    <a href="{% url 'register' %}" class="text-sm text-[color:var(--primary-color)] hover:underline">Register</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
