{% extends "base.html" %}

{% block title %}Register - Polly{% endblock %}

{% block content %}
    <div class="bg-white shadow rounded-lg p-6 max-w-md mx-auto">
        <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">Register</h2>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {{ form.non_field_errors }}
            <div>
                <label for="id_username" class="block text-sm font-medium text-gray-700">Username</label>
                <input
                    type="text"
                    name="username"
                    id="id_username"
                    required
                    class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                >
                {{ form.username.errors }}
            </div>
            <div>
                <label for="id_password1" class="block text-sm font-medium text-gray-700">Password</label>
                <input
                    type="password"
                    name="password1"
                    id="id_password1"
                    required
                    class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                >
                {{ form.password1.errors }}
            </div>
            <div>
                <label for="id_password2" class="block text-sm font-medium text-gray-700">Confirm Password</label>
                <input
                    type="password"
                    name="password2"
                    id="id_password2"
                    required
                    class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                >
                {{ form.password2.errors }}
            </div>
            <div>
                <button
                    type="submit"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
                >
                    Register
                </button>
            </div>
        </form>
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">
                Already have an account? <a href="{% url 'login' %}" class="text-blue-600 hover:underline">Log in</a>
            </p>
        </div>
    </div>
{% endblock %}
