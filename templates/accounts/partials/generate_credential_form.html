{% load static %}

<form method="post" action="{% url 'generate_credential' %}">
    {% csrf_token %}
    <div class="mb-4">
        <label for="credential_name" class="block text-sm font-medium text-gray-700 mb-2">
            Credential Name
        </label>
        <input
            type="text"
            id="credential_name"
            name="credential_name"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-[color:var(--primary-color)] focus:border-[color:var(--primary-color)]"
            placeholder="e.g., Professional Certification"
            maxlength="100"
            required
        />
    </div>
    <div class="mb-4">
        <label for="credential_type" class="block text-sm font-medium text-gray-700 mb-2">
            Credential Type
        </label>
        <select
            id="credential_type"
            name="credential_type"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-[color:var(--primary-color)] focus:border-[color:var(--primary-color)]"
            required
        >
            <option value="MembershipCredential">Membership Credential</option>
            <option value="ProfessionalCredential">Professional Credential</option>
            <option value="CertificationCredential">Certification Credential</option>
            <option value="RoleCredential">Role Credential</option>
            <option value="AttributeCredential">Attribute Credential</option>
        </select>
    </div>
    <div class="flex justify-end space-x-3 mt-4">
        <button
            type="button"
            onclick="document.getElementById('generate-credential-modal').classList.add('hidden')"
            class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500"
        >
            Cancel
        </button>
        <button
            type="submit"
            class="px-4 py-2 text-sm font-medium text-white bg-[color:var(--primary-color)] rounded-md hover:bg-[color:var(--primary-hover)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[color:var(--primary-focus)]"
        >
            Generate Credential
        </button>
    </div>
</form>
