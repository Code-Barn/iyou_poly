<div class="space-y-4">
    {% if error %}
        <div class="bg-red-50 border-l-4 border-red-400 p-4">
            <p class="text-red-700">{{ error }}</p>
        </div>
    {% endif %}

    <div>
        <label for="vc" class="block text-sm font-medium text-gray-700 mb-1">
            Verifiable Credential JSON
        </label>
        <textarea
            id="vc"
            name="vc"
            rows="8"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
            placeholder='Paste your VC JSON here'
            required
        >{{ vc|escape }}</textarea>
        <p class="mt-1 text-sm text-gray-500">
            Paste your Verifiable Credential JSON from your VC management page.
        </p>
    </div>

    <div></div>
        <label for="vc_proof" class="block text-sm font-medium text-gray-700 mb-1">
            VC Proof (optional)
        </label>
        <textarea
            id="vc_proof"
            name="vc_proof"
            rows="3"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
            placeholder='Paste your VC proof here if available'
        >{{ vc_proof|escape }}</textarea>
    </div>

    <input type="hidden" name="next" value="{{ next }}">

    <div class="flex justify-end space-x-3">
        <button
            type="button"
            onclick="window.location.href='{% url 'login' %}'"
            class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500"
        >
            Cancel
        </button>
        <button
            type="submit"
            class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
        >
            Login with DID
        </button>
    </div>
</div>
