<header class="w-full border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 px-6 py-3 flex items-center justify-between font-mono text-sm shadow-sm pt-5">
    <div class="flex items-center space-x-2">
        <span class="font-bold tracking-tight text-purple-600 dark:text-purple-400">iyou_</span>
        <span class="text-slate-500 font-semibold">{{ app_prefix|default:"mesh" }}</span>
    </div>

    <div class="flex items-center space-x-4 text-xs">
        {% if request.user.is_authenticated %}
            <div class="flex items-center space-x-2 bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded border border-slate-200 dark:border-slate-700">
                <span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-slate-600 dark:text-slate-300 max-w-[240px] truncate" title="{{ request.user.username }}">{{ request.user.username }}</span>
            </div>
            <a href="{% url 'oidc_logout' %}" class="text-slate-400 hover:text-rose-500 transition-colors duration-150">Sign Out</a>
        {% else %}
            <div class="flex items-center space-x-2">
                <span class="inline-block w-1.5 h-1.5 rounded-full bg-amber-500"></span>
                <span class="text-slate-400 italic">Sovereign Key Required</span>
            </div>
            <a href="{% url 'oidc_authentication_init' %}" class="bg-purple-600 hover:bg-purple-500 text-white font-bold px-3 py-1 rounded transition-colors duration-150 shadow-sm">Sign In</a>
        {% endif %}
    </div>
</header>
