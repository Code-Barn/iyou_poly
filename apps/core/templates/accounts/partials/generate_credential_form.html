{% load static %}

<form id="bridge-credential-form" onsubmit="return handleBridgeCredential(event)">
    {% csrf_token %}
    <div class="mb-4">
        <label for="credential_name" class="block text-sm font-medium text-gray-700 mb-2">
            Credential Name
        </label>
        <input
            type="text"
            id="credential_name"
            name="credential_name"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            placeholder="e.g., My Club Membership"
            maxlength="100"
            required
        />
    </div>
    <div class="mb-4">
        <label for="credential_type" class="block text-sm font-medium text-gray-700 mb-2">
            Credential Type
        </label>
        <select
            id="credential_type"
            name="credential_type"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            required
        >
            <option value="family_membership">Family Membership</option>
            <option value="club_membership">Club Membership</option>
            <option value="company_membership">Company Membership</option>
            <option value="voting_authorization">Voting Authorization (Town)</option>
            <option value="county_voting_authorization">County Voting Authorization</option>
            <option value="state_voting_authorization">State Voting Authorization</option>
            <option value="nation_voting_authorization">Nation Voting Authorization</option>
            <option value="global_voting_authorization">Global Voting Authorization</option>
        </select>
    </div>
    <div class="mb-4">
        <label for="scope_value" class="block text-sm font-medium text-gray-700 mb-2">
            Scope (e.g., Family Name, Organization, Town)
        </label>
        <input
            type="text"
            id="scope_value"
            name="scope_value"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            placeholder="e.g., Smith Family, Acme Corp, Auburn, IN"
            maxlength="255"
        />
    </div>
    <div class="mb-4 p-3 bg-indigo-50 border border-indigo-200 rounded-md">
        <label for="subject_did" class="block text-sm font-medium text-indigo-800 mb-2">
            Subject DID <span class="text-xs font-normal text-indigo-500">(optional)</span>
        </label>
        <input
            type="text"
            id="subject_did"
            name="subject_did"
            class="w-full px-3 py-2 border border-indigo-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white"
            placeholder="Leave blank to issue to yourself"
            maxlength="255"
        />
        <p class="mt-1 text-xs text-indigo-600">Issue a credential for another DID. They will receive the signed VC in their vault.</p>
    </div>
    <div id="bridge-status" class="text-sm text-gray-600 mb-3 hidden"></div>
    <div class="flex justify-end space-x-3 mt-6">
        <button
            type="button"
            onclick="document.getElementById('generate-credential-modal').classList.add('hidden')"
            class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500"
        >
            Cancel
        </button>
        <button
            type="submit"
            id="bridge-submit-btn"
            class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
        >
            Generate & Sign via Bridge
        </button>
    </div>
</form>
