<nav class="bg-white shadow-sm border-b dark:bg-gray-800">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        <span class="font-bold text-lg text-indigo-600 dark:text-indigo-400">Poly</span>
        <div class="flex items-center gap-4">
            <a href="{% url 'poll_list' %}" class="text-sm text-gray-600 hover:text-indigo-600 dark:text-gray-300 dark:hover:text-indigo-400">Polls</a>
            {% if user.is_authenticated %}
                <span class="text-xs bg-purple-100 text-purple-800 px-2 py-0.5 rounded-full font-medium dark:bg-purple-900 dark:text-purple-200" title="{{ user.username }}">
                    {% if "did:" in user.username %}{{ user.username|truncatechars:24 }}{% else %}{{ user.username }}{% endif %}
                </span>
                <a href="{% url 'vc_management' %}" class="text-sm text-gray-600 hover:text-indigo-600 dark:text-gray-300 dark:hover:text-indigo-400">Credentials</a>
            {% endif %}
            <a href="http://127.0.0.1:8001" class="text-sm font-bold text-indigo-700 bg-indigo-50 px-3 py-1.5 rounded-md hover:bg-indigo-100 border border-indigo-200 dark:bg-indigo-900 dark:text-indigo-200 dark:border-indigo-700 dark:hover:bg-indigo-800">Return to Social Feed</a>
            <span id="meshBadge" class="text-xs bg-green-100 text-green-800 px-2 py-0.5 rounded-full font-medium hidden dark:bg-green-900 dark:text-green-200">Sovereign Mesh Active</span>
            {% if user.is_authenticated %}
                <form action="{% url 'oidc_logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="text-sm text-red-500 hover:text-red-700 bg-transparent border-none cursor-pointer dark:text-red-400 dark:hover:text-red-300">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'oidc_authentication_init' %}" class="text-sm text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300">Login</a>
            {% endif %}
        </div>
    </div>
</nav>

<script>
document.addEventListener("DOMContentLoaded", function () {
    var badge = document.getElementById("meshBadge");
    if (!badge) return;
    fetch("{{ idp_home_url }}", { signal: AbortSignal.timeout(300) })
        .then(function (r) { if (r.ok) badge.classList.remove("hidden"); })
        .catch(function () {});
});
</script>
