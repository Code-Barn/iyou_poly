{% extends "base.html" %}
{% block title %}DID Login - Poly{% endblock %}
{% block content %}
    <div class="max-w-4xl mx-auto mt-8">
        <div class="bg-white shadow rounded-lg p-6 text-center">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">DID Login Disabled</h2>
            <p class="text-gray-600 mb-6">
                Direct DID login has been replaced by OIDC-based sovereign authentication.
                Please use the Sovereign Identity Provider to login.
            </p>
            <a href="{% url 'oidc_authentication_init' %}"
               class="inline-block bg-blue-600 text-white py-3 px-8 rounded-md hover:bg-blue-700 font-medium">
                Login with Sovereign Identity
            </a>
        </div>
    </div>
{% endblock %}
