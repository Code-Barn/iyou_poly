{% extends "base.html" %}

{% block title %}Poll Not Found - Poly{% endblock %}

{% block content %}
    <div class="bg-white shadow rounded-lg p-6 text-center">
        <h2 class="text-2xl font-bold text-gray-900 mb-4">Poll Not Found</h2>
        <p class="text-gray-600 mb-6">
            The poll you're looking for doesn't exist or has been deleted.
        </p>
        <a
            href="{% url 'poll_list' %}"
            class="inline-block bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
        >
            Back to Polls
        </a>
    </div>
{% endblock %}
