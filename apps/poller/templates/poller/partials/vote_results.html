<div class="bg-gray-50 rounded-lg p-4">
    <h3 class="text-lg font-medium text-gray-900 mb-3">Results</h3>
    {% if poll.votes.count %}
        <div class="space-y-2">
            {% for option in poll.options.all %}
                {% with vote_count=option.votes %}
                    <div class="flex items-center">
                        <div class="w-full bg-gray-200 rounded-full h-2.5">
                            <div
                                class="bg-blue-600 h-2.5 rounded-full"
                                style="width: {% widthratio vote_count poll.votes.count 100 %}%"
                            ></div>
                        </div>
                        <span class="ml-3 text-sm text-gray-600">
                            {{ option.text }} • {{ option.votes }} vote{{ option.votes|pluralize }}
                        </span>
                    </div>
                {% endwith %}
            {% endfor %}
        </div>
        <p class="text-sm text-gray-500 mt-2">
            Total votes: {{ poll.votes.count }}
        </p>
    {% else %}
        <p class="text-gray-500">No votes yet.</p>
    {% endif %}
</div>
